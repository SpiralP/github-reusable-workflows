on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        description: Runner to use for the job.
        required: false
        type: string
      flake-attribute:
        default: default
        description: Nix flake attribute path to default output to test build.
        required: false
        type: string
      upload-build-result:
        default: false
        description: Upload the build result as an artifact. (named "build-result")
        required: false
        type: boolean
      upload-pages-artifact:
        default: false
        description: |
          Package the build result as a `github-pages` artifact (via
          actions/upload-pages-artifact, which tars it into the shape
          actions/deploy-pages requires) so a downstream deploy-pages or
          the deploy-pages-from-run action can consume it directly.
        required: false
        type: boolean

# Can't restrict permissions here, or else all use cases require `actions: write`
# permissions:
#   actions: write # for uploading artifact
#   contents: read # for checkout

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        if: ${{ inputs.runs-on != 'self-hosted' }}

      - run: sudo chown -R "$(id -u):$(id -g)" /nix
        if: ${{ inputs.runs-on != 'self-hosted' }}
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        if: ${{ inputs.runs-on != 'self-hosted' }}
        with:
          primary-key: nix-build-${{ inputs.flake-attribute }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-build-${{ inputs.flake-attribute }}-${{ runner.os }}-${{ runner.arch }}-
          gc-max-store-size: 5G
      - run: sudo chown -R 0:0 /nix
        if: ${{ inputs.runs-on != 'self-hosted' }}

      - name: Build ${{ inputs.flake-attribute }}
        run: |
          set -euo pipefail
          nix build '.?submodules=1#${{ inputs.flake-attribute }}' \
            --print-build-logs --no-update-lock-file

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ inputs.upload-build-result }}
        with:
          name: build-result
          path: result
          if-no-files-found: error

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        if: ${{ inputs.upload-pages-artifact }}
        with:
          path: result
