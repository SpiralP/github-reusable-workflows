on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        description: Runner to use for the job.
        required: false
        type: string
      args:
        default: ""
        description: Arguments to pass to semantic-release.
        required: false
        type: string
      extends:
        default: ""
        description: Path to a config file for extending semantic-release.
        required: false
        type: string
      replace-files:
        default: ""
        description: |
          List of files (separated by line) to replace versions in.
          A commit will be created for this release.
        required: false
        type: string
      package-name:
        default: ""
        description: Name of the package to replace versions for.
        required: false
        type: string
      version-metadata:
        default: ""
        description: Extra metadata to add to version number (v1.2.3+metadata)
        required: false
        type: string
      environment-name:
        default: ""
        description: Name of the environment to use for the job.
        required: false
        type: string
      environment-url:
        default: ""
        description: URL of the environment to use for the job.
        required: false
        type: string
      cargo-publish:
        default: false
        description: Whether to publish a Rust crate to crates.io
        required: false
        type: boolean
      assets:
        default: ""
        description: |
          Glob patterns (one per line) of filenames to attach to the GitHub
          release. Patterns match against filenames within the run's uploaded
          artifacts (download-artifact merge-multiple flattens them into a
          single directory). Caller does not specify a path - just filename
          patterns, e.g. `*.{so,dll,dylib}`. Required for repos with
          "Require immutable releases" enabled, since immutable releases
          must be published with their assets attached.
        required: false
        type: string
      build-workflow:
        default: ""
        description: |
          Filename of a workflow_dispatch-triggered build workflow (e.g.
          `build.yml`) to run on the release tag before the GitHub release
          is created. Dispatched via `--ref <tag>` so the workflow's default
          checkout pins to the exact released commit — no extra inputs
          required on the dispatched workflow. Artifacts uploaded by the
          dispatched run are downloaded into `.release-assets/` for
          `@semantic-release/github` to attach (suppresses the in-job
          `actions/download-artifact` step that runs when `assets` is set).
          On any release error, the tag is auto-deleted from the remote
          so the next run starts clean.
        required: false
        type: string
    outputs:
      tag:
        description: The tag created by the release.
        value: ${{ jobs.release.outputs.tag }}
      version:
        description: The version created by the release.
        value: ${{ jobs.release.outputs.version }}
      dispatched-run-id:
        description: |
          Run ID of the build workflow dispatched on the release tag,
          when `build-workflow:` was set. Empty otherwise. Use with
          `actions/download-artifact`'s `run-id:` to pull a cross-run
          artifact from that dispatched build, or with the
          `deploy-pages-from-run` action shipped in this repo.
        value: ${{ jobs.release.outputs.dispatched-run-id }}
    secrets:
      app-client-id:
        description: GitHub App Client ID
        required: false
      app-private-key:
        description: GitHub App private key
        required: false
      token:
        description: GitHub token
        required: false
      cargo-registry-token:
        description: Cargo registry token for publishing Rust crates to crates.io
        required: false

# Don't restrict permissions here, since you can pass a custom token
# permissions:
#   contents: write # for checkout, and to be able to create a release

jobs:
  release:
    runs-on: ${{ inputs.runs-on }}
    environment:
      name: ${{ inputs.environment-name }}
      url: ${{ inputs.environment-name && (inputs.environment-url ||
        format('{0}/{1}/releases/{2}', github.server_url, github.repository,
        steps.release.outputs.tag && format('tag/{0}',
        steps.release.outputs.tag) || 'latest')) || '' }}
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      dispatched-run-id: ${{ steps.release.outputs.dispatched-run-id }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        if: ${{ env.OK == 'true-true-true' }}
        env:
          OK: ${{ secrets.token == '' }}-${{ secrets.app-client-id != '' }}-${{
            secrets.app-private-key != '' }}
        with:
          client-id: ${{ secrets.app-client-id }}
          private-key: ${{ secrets.app-private-key }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ secrets.token || steps.app-token.outputs.token || github.token }}
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        if: ${{ inputs.runs-on != 'self-hosted' }}
      - run: sudo chown -R "$(id -u):$(id -g)" /nix
        if: ${{ inputs.runs-on != 'self-hosted' }}
      - name: Get workflow SHA
        id: get-workflow-sha
        run: |
          workflow_path="$(printf '%s' "$GITHUB_WORKFLOW_REF" | sed 's/[^/]*\/[^/]*\/\([^@]*\).*/\1/')"
          echo "workflow_path=$workflow_path"
          workflow_sha="$(cat "$workflow_path" | grep -F ' uses: SpiralP/github-reusable-workflows/.github/workflows/release.yml' | sed 's/.*@\(\S*\).*/\1/')"
          test -z "$workflow_sha" && workflow_sha="main"
          echo "workflow-sha=$workflow_sha" | tee -a "$GITHUB_OUTPUT"
        env:
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        if: ${{ inputs.runs-on != 'self-hosted' }}
        with:
          primary-key:
            nix-release-semantic-release-${{ runner.os }}-${{ runner.arch }}-${{
            steps.get-workflow-sha.outputs.workflow-sha }}
          restore-prefixes-first-match: nix-release-semantic-release-${{ runner.os }}-${{ runner.arch }}-
          gc-max-store-size: 5G
      - run: sudo chown -R 0:0 /nix
        if: ${{ inputs.runs-on != 'self-hosted' }}
      - run: |
          nix build "github:SpiralP/github-reusable-workflows/$WORKFLOW_SHA#semantic-release" \
            --print-build-logs --print-out-paths --out-link "$TMPDIR/semantic-release"
        env:
          TMPDIR: ${{ runner.temp }}
          WORKFLOW_SHA: ${{ steps.get-workflow-sha.outputs.workflow-sha }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.assets != '' && inputs.build-workflow == '' }}
        with:
          path: ${{ github.workspace }}/.release-assets
          merge-multiple: true
      - name: Release
        id: release
        run: |
          REPO_NAME="$(echo "$REPO" | cut -d '/' -f 2)"
          export PACKAGE_NAME="${PACKAGE_NAME:-$REPO_NAME}"
          VERSION_OUTPUT_FILE="$(mktemp)"
          export VERSION_OUTPUT_FILE
          TAG_OUTPUT_FILE="$(mktemp)"
          export TAG_OUTPUT_FILE
          DISPATCHED_RUN_ID_FILE="$(mktemp)"
          export DISPATCHED_RUN_ID_FILE

          "$TMPDIR/semantic-release/bin/semantic-release" ${{ inputs.args }}

          echo "version=$(cat "$VERSION_OUTPUT_FILE")" | tee -a "$GITHUB_OUTPUT"
          echo "tag=$(cat "$TAG_OUTPUT_FILE")" | tee -a "$GITHUB_OUTPUT"
          echo "dispatched-run-id=$(cat "$DISPATCHED_RUN_ID_FILE")" | tee -a "$GITHUB_OUTPUT"
        env:
          ASSETS: ${{ inputs.assets }}
          BUILD_WORKFLOW: ${{ inputs.build-workflow }}
          CARGO_PUBLISH: ${{ inputs.cargo-publish }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.cargo-registry-token }}
          EXTENDS: ${{ inputs.extends }}
          GITHUB_TOKEN: ${{ secrets.token || steps.app-token.outputs.token || github.token }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          REPLACE_FILES: ${{ inputs.replace-files }}
          REPO: ${{ github.repository }}
          TMPDIR: ${{ runner.temp }}
          VERSION_METADATA: ${{ inputs.version-metadata }}
          WORKFLOW_SHA: ${{ steps.get-workflow-sha.outputs.workflow-sha }}
