name: build-classicube-plugin
description: |
  Build, test, and upload a ClassiCube plugin cdylib for one platform/arch,
  with a SLSA build-provenance attestation. Caller is responsible for
  actions/checkout and any pre-build steps (dep install, cache, msbuild
  setup, etc.) before invoking this action.

  Required caller permissions (workflow- or job-level):
    contents: read       # for checkout
    id-token: write      # for the Sigstore OIDC exchange
    attestations: write  # to publish the signed bundle to GitHub
  See https://github.com/actions/attest for details.

inputs:
  arch:
    description: x86_64 | i686 | aarch64 (used in the asset filename).
    required: true
  target:
    description: Full Cargo target triple, e.g. x86_64-unknown-linux-gnu.
    required: true
  release-mode:
    description: When "true", builds the release profile; when "false", builds debug.
    default: "true"
  test-command:
    description: |
      Test command up to (but not including) `--target` and the release flag.
      Default targets cargo-nextest. For `cargo test`, pass `cargo test`.
    default: cargo nextest run
  test-args:
    description: |
      Trailing test args, appended after `--target` and the release flag
      (e.g. `--no-capture` for nextest, or `-- --nocapture --test-threads 1`
      for `cargo test`).
    default: --no-capture
  asset-prefix:
    description: |
      Override the asset basename. Default auto-derives from `$GITHUB_REPOSITORY`:
      repo name minus a trailing `-plugin`, with hyphens swapped for underscores
      (e.g. `classicube-foo-plugin` -> `classicube_foo`).
    default: ""
  use-cross:
    description: |
      When "true", use `cross` (cross-rs/cross) for build and test instead of
      `cargo`. Cross runs the toolchain inside a Docker container, so the
      Linux i686 multilib setup and `rustup target add` steps are skipped.
      If `test-command` starts with `cargo`, it is rewritten to start with
      `cross`. As a special case, the default `cargo nextest run` is rewritten
      to `cross test` (rather than `cross nextest run`) because the default
      cross images don't ship cargo-nextest; the default `test-args` of
      `--no-capture` is likewise rewritten to `-- --nocapture` so the
      fallback runs cleanly. Pass an explicit `test-command` and
      `test-args` to opt out of this remap. Effectively Linux-only on
      GitHub-hosted runners.
    default: "false"

runs:
  using: composite
  steps:
    - name: Derive build env
      shell: bash
      env:
        IN_ASSET_PREFIX: ${{ inputs.asset-prefix }}
        IN_ARCH: ${{ inputs.arch }}
        IN_TARGET: ${{ inputs.target }}
        PROFILE: ${{ inputs.release-mode == 'true' && 'release' || 'debug' }}
      run: |
        if [[ -n "$IN_ASSET_PREFIX" ]]; then
          ap="$IN_ASSET_PREFIX"
        else
          repo="${GITHUB_REPOSITORY##*/}"
          short="${repo%-plugin}"
          ap="${short//-/_}"
        fi
        case "$RUNNER_OS" in
          Linux)   ext=so;     lib_prefix=lib; os_token=linux ;;
          macOS)   ext=dylib;  lib_prefix=lib; os_token=macos ;;
          Windows) ext=dll;    lib_prefix=;    os_token=windows ;;
          *) echo "::error::unsupported RUNNER_OS=$RUNNER_OS"; exit 1 ;;
        esac
        asset_name="${ap}_${os_token}_${IN_ARCH}"
        cargo_cmd="${{ inputs.use-cross == 'true' && 'cross' || 'cargo' }}"
        test_cmd='${{ inputs.test-command }}'
        test_args='${{ inputs.test-args }}'
        if [[ "$cargo_cmd" == "cross" ]]; then
          # Default cross images don't ship cargo-nextest, so fall back to
          # plain `cross test` when the caller hasn't overridden test-command.
          # Also retranslate the default nextest --no-capture flag to the
          # libtest equivalent so the fallback runs cleanly.
          if [[ "$test_cmd" == "cargo nextest run" ]]; then
            test_cmd="cross test"
            if [[ "$test_args" == "--no-capture" ]]; then
              test_args="-- --nocapture"
            fi
          else
            test_cmd="${test_cmd/#cargo/cross}"
          fi
        fi
        {
          echo "ASSET_PREFIX=$ap"
          echo "BUILT_PATH=target/${IN_TARGET}/${PROFILE}/${lib_prefix}${ap}_plugin.${ext}"
          echo "ASSET_NAME=$asset_name"
          echo "ASSET_FILE=${asset_name}.${ext}"
          echo "CARGO_CMD=$cargo_cmd"
          echo "TEST_CMD=$test_cmd"
          echo "TEST_ARGS=$test_args"
        } >> "$GITHUB_ENV"

    - name: Linux i686 cross-compile prerequisites
      if: ${{ runner.os == 'Linux' && inputs.arch == 'i686' && inputs.use-cross != 'true' }}
      shell: bash
      run: |
        sudo dpkg --add-architecture i386
        echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

    - name: Add rust target
      if: ${{ inputs.use-cross != 'true' }}
      shell: bash
      run: rustup target add "${{ inputs.target }}"

    - uses: taiki-e/install-action@fa0dd4cd0a40696e6f9766370614a5ce482e6aa8 # v2.77.5
      if: ${{ inputs.use-cross == 'true' }}
      with:
        tool: cross

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: ${{ inputs.target }}
        # Skip save on tag refs: GHA scopes them to that one tag, so they're orphaned.
        save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    - name: Build
      shell: bash
      run: |
        $CARGO_CMD build --target "${{ inputs.target }}" ${{ inputs.release-mode == 'true' && '--release' || '' }}
        ls -lh "$BUILT_PATH"
        if command -v file >/dev/null; then
          file "$BUILT_PATH"
        fi
        if command -v sha256sum >/dev/null; then
          sha256sum "$BUILT_PATH"
        elif command -v shasum >/dev/null; then
          shasum -a 256 "$BUILT_PATH"
        fi

    - uses: taiki-e/install-action@fa0dd4cd0a40696e6f9766370614a5ce482e6aa8 # v2.77.5
      if: ${{ contains(inputs.test-command, 'nextest') && inputs.use-cross != 'true' }}
      with:
        tool: cargo-nextest

    - name: Test and rename
      shell: bash
      run: |
        $TEST_CMD --target "${{ inputs.target }}" ${{ inputs.release-mode == 'true' && '--release' || '' }} $TEST_ARGS
        mv "$BUILT_PATH" "./$ASSET_FILE"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ env.ASSET_NAME }}
        path: ${{ env.ASSET_FILE }}

    - name: Generate build provenance attestation
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-path: ${{ env.ASSET_FILE }}
