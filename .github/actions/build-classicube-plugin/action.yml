name: build-classicube-plugin
description: |
  Build, test, and upload a ClassiCube plugin cdylib for one platform/arch,
  with a SLSA build-provenance attestation. Caller is responsible for
  actions/checkout and any pre-build steps (dep install, cache, msbuild
  setup, etc.) before invoking this action.

  Required caller permissions (workflow- or job-level):
    contents: read       # for checkout
    id-token: write      # for the Sigstore OIDC exchange
    attestations: write  # to publish the signed bundle to GitHub
  By default (attest: auto) the attestation step is skipped on non-public
  repos, since GitHub's attestation API rejects user-owned private
  repositories; the id-token / attestations permissions then go unused but
  remain harmless. See https://github.com/actions/attest for details.

inputs:
  arch:
    description: x86_64 | i686 | aarch64 (used in the asset filename).
    required: true
  target:
    description: Full Cargo target triple, e.g. x86_64-unknown-linux-gnu.
    required: true
  release-mode:
    description: When "true", builds the release profile; when "false", builds debug.
    default: "true"
  test-command:
    description: |
      Test command up to (but not including) `--target` and the release flag.
      Default targets cargo-nextest. For `cargo test`, pass `cargo test`.
    default: cargo nextest run
  test-args:
    description: |
      Trailing test args, appended after `--target` and the release flag
      (e.g. `--no-capture` for nextest, or `-- --nocapture --test-threads 1`
      for `cargo test`).
    default: --no-capture
  use-cross:
    description: |
      When "true", use `cross` (cross-rs/cross) for build and test instead of
      `cargo`. Cross runs the toolchain inside a Docker container, so the
      Linux i686 multilib setup and `rustup target add` steps are skipped.
      If `test-command` starts with `cargo`, it is rewritten to start with
      `cross`. As a special case, the default `cargo nextest run` is rewritten
      to `cross test` (rather than `cross nextest run`) because the default
      cross images don't ship cargo-nextest; the default `test-args` of
      `--no-capture` is likewise rewritten to `-- --nocapture` so the
      fallback runs cleanly. Pass an explicit `test-command` and
      `test-args` to opt out of this remap. Effectively Linux-only on
      GitHub-hosted runners.
    default: "false"
  attest:
    description: |
      Whether to generate a SLSA build-provenance attestation for the staged
      artifacts. "auto" (default) attests only when the repository is public,
      since GitHub's attestation API rejects user-owned private repos
      (https://docs.github.com/rest/repos/attestations#create-an-attestation).
      "true" forces it (for org-owned private/internal repos that support
      attestation); "false" disables it entirely.
    default: auto

runs:
  using: composite
  steps:
    - name: Derive build env
      shell: bash
      env:
        IN_ARCH: ${{ inputs.arch }}
        IN_TARGET: ${{ inputs.target }}
        PROFILE: ${{ inputs.release-mode == 'true' && 'release' || 'debug' }}
      run: |
        set -euo pipefail
        case "$RUNNER_OS" in
          Linux)   lib_ext=.so;    bin_ext=;     lib_prefix=lib; os_token=linux ;;
          macOS)   lib_ext=.dylib; bin_ext=;     lib_prefix=lib; os_token=macos ;;
          Windows) lib_ext=.dll;   bin_ext=.exe; lib_prefix=;    os_token=windows ;;
          *) echo "::error::unsupported RUNNER_OS=$RUNNER_OS"; exit 1 ;;
        esac
        cargo_cmd="${{ inputs.use-cross == 'true' && 'cross' || 'cargo' }}"
        test_cmd='${{ inputs.test-command }}'
        test_args='${{ inputs.test-args }}'
        if [[ "$cargo_cmd" == "cross" ]]; then
          # Default cross images don't ship cargo-nextest, so fall back to
          # plain `cross test` when the caller hasn't overridden test-command.
          # Also retranslate the default nextest --no-capture flag to the
          # libtest equivalent so the fallback runs cleanly.
          if [[ "$test_cmd" == "cargo nextest run" ]]; then
            test_cmd="cross test"
            if [[ "$test_args" == "--no-capture" ]]; then
              test_args="-- --nocapture"
            fi
          else
            test_cmd="${test_cmd/#cargo/cross}"
          fi
        fi
        # Discover cdylib + [[bin]] target paths once. Space-separated since
        # cargo target names are valid Rust identifiers (no spaces / glob
        # chars), so consumers can iterate with `for p in $CDYLIB_PATHS`.
        build_dir="target/${IN_TARGET}/${PROFILE}"
        metadata="$(cargo metadata --no-deps --format-version 1)"
        cdylib_paths="$(echo "$metadata" \
          | jq -r --arg dir "$build_dir" --arg prefix "$lib_prefix" --arg ext "$lib_ext" \
            '[.packages[].targets[] | select(.kind[] == "cdylib") | "\($dir)/\($prefix)\(.name)\($ext)"] | join(" ")')"
        bin_paths="$(echo "$metadata" \
          | jq -r --arg dir "$build_dir" --arg ext "$bin_ext" \
            '[.packages[].targets[] | select(.kind[] == "bin") | "\($dir)/\(.name)\($ext)"] | join(" ")')"
        {
          echo "ARTIFACT_DIR=${RUNNER_TEMP}/build-classicube-plugin-artifact"
          echo "LIB_EXT=$lib_ext"
          echo "LIB_PREFIX=$lib_prefix"
          echo "BIN_EXT=$bin_ext"
          echo "CDYLIB_PATHS=$cdylib_paths"
          echo "BIN_PATHS=$bin_paths"
          echo "OS_TOKEN=$os_token"
          echo "CARGO_CMD=$cargo_cmd"
          echo "TEST_CMD=$test_cmd"
          echo "TEST_ARGS=$test_args"
        } >> "$GITHUB_ENV"

    - name: Linux i686 cross-compile prerequisites
      if: ${{ runner.os == 'Linux' && inputs.arch == 'i686' && inputs.use-cross != 'true' }}
      shell: bash
      run: |
        sudo dpkg --add-architecture i386
        echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

    - name: Add rust target
      if: ${{ inputs.use-cross != 'true' }}
      shell: bash
      run: rustup target add "${{ inputs.target }}"

    - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
      if: ${{ inputs.use-cross == 'true' }}
      with:
        tool: cross

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: ${{ inputs.target }}
        # Skip save on tag refs: GHA scopes them to that one tag, so they're orphaned.
        save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    - name: Build
      shell: bash
      run: |
        set -euo pipefail
        $CARGO_CMD build --target "${{ inputs.target }}" ${{ inputs.release-mode == 'true' && '--release' || '' }}
        for p in $CDYLIB_PATHS $BIN_PATHS; do
          ls -lh "$p"
          if command -v file >/dev/null; then
            file "$p"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "$p"
          elif command -v shasum >/dev/null; then
            shasum -a 256 "$p"
          fi
        done

    - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
      if: ${{ contains(inputs.test-command, 'nextest') && inputs.use-cross != 'true' }}
      with:
        tool: cargo-nextest

    - name: Test and stage artifacts
      shell: bash
      run: |
        set -euo pipefail
        $TEST_CMD --target "${{ inputs.target }}" ${{ inputs.release-mode == 'true' && '--release' || '' }} $TEST_ARGS
        # Stage cdylib + [[bin]] targets discovered via `cargo metadata`
        # under $RUNNER_TEMP. upload-artifact / attest then glob
        # `$ARTIFACT_DIR/*`; the glob's lowest-common-ancestor is the dir
        # itself, so contents land flat (no leading path). Each file is
        # renamed to <name>_<os>_<arch>[.ext], where <name> is the cargo
        # target name. cdylibs additionally have their `lib` prefix
        # stripped (cargo adds it on Linux/macOS) and a trailing `_plugin`
        # stripped to match the ClassiCube plugin file-naming convention.
        rm -rf "$ARTIFACT_DIR" && mkdir -p "$ARTIFACT_DIR"
        for src in $CDYLIB_PATHS; do
          name="$(basename "$src" "$LIB_EXT")"
          name="${name#$LIB_PREFIX}"
          name="${name%_plugin}"
          mv -v "$src" "$ARTIFACT_DIR/${name}_${OS_TOKEN}_${{ inputs.arch }}${LIB_EXT}"
        done
        for src in $BIN_PATHS; do
          name="$(basename "$src" "$BIN_EXT")"
          mv -v "$src" "$ARTIFACT_DIR/${name}_${OS_TOKEN}_${{ inputs.arch }}${BIN_EXT}"
        done
        ls -lh "$ARTIFACT_DIR"
        # Auto-derive the upload-artifact group name from $GITHUB_REPOSITORY:
        # repo name minus a trailing `-plugin`, hyphens swapped for
        # underscores (e.g. `classicube-foo-plugin` -> `classicube_foo`).
        repo="${GITHUB_REPOSITORY##*/}"
        short="${repo%-plugin}"
        echo "ASSET_NAME=${short//-/_}_${OS_TOKEN}_${{ inputs.arch }}" >> "$GITHUB_ENV"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ env.ASSET_NAME }}
        path: ${{ env.ARTIFACT_DIR }}/*
        if-no-files-found: error

    - name: Generate build provenance attestation
      if: ${{ inputs.attest == 'true' || (inputs.attest == 'auto' && github.event.repository.visibility == 'public') }}
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        show-summary: false
        subject-path: ${{ env.ARTIFACT_DIR }}/*
